kind = "web"
previewPath = "/"
title = "AI Resume Screener"
version = "1.0.0"
id = "artifacts/resume-screener"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 19859

[services.development]
run = "pnpm --filter @workspace/resume-screener run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/resume-screener", "run", "build" ]
publicDir = "artifacts/resume-screener/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19859"
BASE_PATH = "/"
